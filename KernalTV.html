                                {/* LOCALIZATION */}
                                <div>
                                    <h3 className="text-xs font-black text-gray-500 uppercase tracking-wider mb-3 ml-2">Localization</h3>
                                    <div className="bg-white dark:bg-[#151517] rounded-[2rem] p-5 shadow-sm border border-black/5 dark:border-white/5 space-y-4">
                                        <div className="flex gap-4">
                                            <div className="flex-1">
                                                <label className="text-[10px] uppercase font-bold text-gray-500 block mb-1">Region</label>
                                                <select value={settings.region} onChange={e => { updateSetting('region', e.target.value); fetchExplore(true); }} className="w-full bg-gray-50 dark:bg-[#1C1C1E] text-sm font-bold px-4 py-3 rounded-xl focus:outline-none border border-black/5 dark:border-white/5 appearance-none">
                                                    {["US", "GB", "IN", "CA", "AU", "JP"].map(r => <option key={r} value={r}>{r}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-[10px] uppercase font-bold text-gray-500 block mb-1">Language</label>
                                                <select value={settings.language} onChange={e => { updateSetting('language', e.target.value); fetchExplore(true); }} className="w-full bg-gray-50 dark:bg-[#1C1C1E] text-sm font-bold px-4 py-3 rounded-xl focus:outline-none border border-black/5 dark:border-white/5 appearance-none">
                                                    {["en-US", "es-ES", "fr-FR", "de-DE", "ja-JP", "hi-IN"].map(l => <option key={l} value={l}>{l}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* TAB REORDERING */}
                                <div>
                                    <h3 className="text-xs font-black text-gray-500 uppercase tracking-wider mb-3 ml-2">Tab Management</h3>
                                    <div className="bg-white dark:bg-[#151517] rounded-[2rem] p-4 shadow-sm border border-black/5 dark:border-white/5 space-y-2">
                                        {settings.tabsOrder.map((tabId, idx) => {
                                            const tabInfo = AVAILABLE_TABS.find(t => t.id === tabId);
                                            return (
                                                <div key={tabId} className="flex justify-between items-center bg-gray-50 dark:bg-[#1C1C1E] p-3 rounded-xl border border-black/5 dark:border-white/5">
                                                    <div className="flex items-center">{React.createElement(tabInfo.i, {s: 18, c: "mr-3 text-gray-400"})}<span className="font-bold text-sm">{tabInfo.l}</span></div>
                                                    <div className="flex space-x-2">
                                                        <button onClick={() => moveTab(idx, 'up')} disabled={idx===0} className={`p-1.5 rounded-lg ${idx===0 ? 'opacity-20' : 'bg-gray-200 dark:bg-[#2C2C2E] bouncy-tap'}`}><Icon.ChevronU s={16}/></button>
                                                        <button onClick={() => moveTab(idx, 'down')} disabled={idx===settings.tabsOrder.length-1} className={`p-1.5 rounded-lg ${idx===settings.tabsOrder.length-1 ? 'opacity-20' : 'bg-gray-200 dark:bg-[#2C2C2E] bouncy-tap'}`}><Icon.ChevronD s={16}/></button>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>

                                {/* SYSTEM CONTROLS */}
                                <div>
                                    <h3 className="text-xs font-black text-gray-500 uppercase tracking-wider mb-3 ml-2">System Controls</h3>
                                    <div className="bg-white dark:bg-[#151517] rounded-[2rem] border border-black/5 dark:border-white/5 overflow-hidden shadow-sm">
                                        <div className="p-5 border-b border-black/5 dark:border-white/5 flex justify-between items-center cursor-pointer bouncy-tap" onClick={() => { updateSetting('adult', !settings.adult); fetchExplore(true); }}>
                                            <span className="font-bold text-sm">Allow Adult Content (TMDB)</span>
                                            <div className={`w-12 h-7 rounded-full transition-colors duration-300 ${settings.adult ? 'bg-accent' : 'bg-gray-200 dark:bg-[#2C2C2E]'} relative`}><div className={`w-5 h-5 bg-white rounded-full absolute top-1 transition-transform duration-300 ${settings.adult ? 'translate-x-6' : 'translate-x-1'}`}></div></div>
                                        </div>
                                        <div className="p-5 flex justify-between items-center cursor-pointer bouncy-tap" onClick={() => updateSetting('theme', settings.theme === 'dark' ? 'light' : 'dark')}>
                                            <span className="font-bold text-sm">Theme Mode ({settings.theme === 'dark' ? 'Black' : 'White'})</span>
                                            <div className={`w-12 h-7 rounded-full transition-colors duration-300 ${settings.theme === 'dark' ? 'bg-accent' : 'bg-gray-200 dark:bg-[#2C2C2E]'} relative`}><div className={`w-5 h-5 bg-white rounded-full absolute top-1 transition-transform duration-300 ${settings.theme === 'dark' ? 'translate-x-6' : 'translate-x-1'}`}></div></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* DYNAMIC HIDABLE BOTTOM TABS */}
                    <div className={`absolute bottom-0 w-full h-[90px] bg-[#F2F2F7]/90 dark:bg-[#000000]/90 backdrop-blur-[40px] border-t border-black/5 dark:border-white/5 flex justify-around items-center px-2 pb-5 z-20 transition-transform duration-300 ease-in-out ${isNavVisible ? 'translate-y-0' : 'translate-y-full'}`}>
                        {settings.tabsOrder.map(tabId => {
                            const t = AVAILABLE_TABS.find(a => a.id === tabId);
                            return (
                                <button key={t.id} onClick={() => { haptic(); setActiveNav(t.id); }} className={`flex flex-col items-center justify-center space-y-1 w-[60px] bouncy-tap transition-colors duration-300 ${activeNav === t.id ? 'text-accent scale-110' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}>
                                    {React.createElement(t.i, {s: 24})}<span className="text-[10px] font-bold">{t.l}</span>
                                </button>
                            );
                        })}
                    </div>

                    {/* CATEGORY / GENRE DEEP DIVE MODAL */}
                    {activeGrid && (
                        <div className="absolute inset-0 z-[70] bg-[#F2F2F7] dark:bg-[#0A0A0C] flex flex-col animate-spring-up">
                            <header className="pt-14 pb-4 px-6 glass-panel sticky top-0 z-20 flex items-center shadow-sm">
                                <button onClick={() => setActiveGrid(null)} className="w-10 h-10 bg-white dark:bg-[#1C1C1E] border border-black/5 dark:border-white/5 rounded-full flex items-center justify-center shadow-sm bouncy-tap mr-4"><Icon.ChevronL s={20} /></button>
                                <h2 className="text-2xl font-black">{activeGrid.title}</h2>
                            </header>
                            <main className="flex-1 overflow-y-auto px-6 py-6 pb-32 hide-scrollbar">
                                {activeGrid.loading ? (
                                    <Icon.Loader s={40} c="mx-auto text-accent mt-10"/>
                                ) : activeGrid.error ? (
                                    <p className="text-center font-bold text-gray-500 mt-10">Couldn't load genre selection.</p>
                                ) : (
                                    <div className="grid grid-cols-3 gap-3">
                                        {activeGrid.items.map((item, idx) => (
                                            <div key={idx} onClick={() => openDetail(item)} className="cursor-pointer bouncy-tap animate-spring-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                                <div className="h-36 bg-gray-200 dark:bg-[#1C1C1E] rounded-[1.2rem] overflow-hidden mb-2 shadow-sm border border-black/5 dark:border-white/5 relative">
                                                    {item.image ? <img src={item.image} loading="lazy" className="w-full h-full object-cover transition-transform duration-500 hover:scale-110"/> : <div className="w-full h-full flex justify-center items-center"><Icon.Film s={24} c="text-gray-400"/></div>}
                                                </div>
                                                <p className="text-[10px] font-bold text-center leading-tight line-clamp-2 px-1">{item.title}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </main>
                        </div>
                    )}

                    {/* VAULT PICKER MODAL FOR PLAYLISTS */}
                    <div className={`absolute inset-0 z-[65] flex flex-col justify-end transition-all duration-400 ${deckPickerOpen ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-400 ${deckPickerOpen ? 'opacity-100' : 'opacity-0'}`} onClick={() => setDeckPickerOpen(false)} />
                        <div className={`bg-[#F2F2F7] dark:bg-[#0A0A0C] w-full h-[80vh] rounded-t-[2.5rem] shadow-2xl relative z-10 flex flex-col transition-transform duration-500 ease-out ${deckPickerOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                            <div className="flex justify-between items-center p-6 border-b border-black/5 dark:border-white/5"><h3 className="font-black text-xl">Add to {activeDeck?.name}</h3><button onClick={() => setDeckPickerOpen(false)} className="bg-gray-200 dark:bg-[#1C1C1E] p-2 rounded-full bouncy-tap"><Icon.X s={20}/></button></div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-3">
                                {vault.map(item => {
                                    const isInDeck = activeDeck?.itemIds.includes(item.id);
                                    return (
                                        <div key={item.id} onClick={() => {haptic();setPlaylists(p => p.map(x => x.id === activeDeck.id ? { ...x, itemIds: isInDeck ? x.itemIds.filter(id => id !== item.id) : [...x.itemIds, item.id] } : x));setActiveDeck(prev => ({...prev, itemIds: isInDeck ? prev.itemIds.filter(id => id !== item.id) : [...prev.itemIds, item.id]}));}} className={`flex items-center p-3 rounded-2xl border cursor-pointer bouncy-tap ${isInDeck ? 'bg-accent/10 border-accent/30' : 'bg-white dark:bg-[#151517] border-black/5 dark:border-white/5'}`}>
                                            <img src={item.image} className="w-10 h-14 object-cover rounded-lg mr-4 bg-gray-200 dark:bg-[#1C1C1E]" />
                                            <span className="flex-1 font-black text-sm">{item.title}</span>
                                            {isInDeck ? <Icon.Check s={20} c="text-accent" /> : <Icon.Plus s={20} c="text-gray-300" />}
                                        </div>
                                    )
                                })}
                                {vault.length === 0 && <p className="text-center font-bold text-gray-500 mt-10">Vault is empty.</p>}
                            </div>
                        </div>
                    </div>

                    {/* ADD / SEARCH MODAL */}
                    <div className={`absolute inset-0 z-[60] flex flex-col justify-end transition-all duration-400 ${addState.open ? 'visible' : 'invisible'}`}>
                        <div className={`absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity duration-400 ${addState.open ? 'opacity-100' : 'opacity-0'}`} onClick={() => setAddState(p => ({...p, open: false}))} />
                        <div className={`bg-[#F2F2F7] dark:bg-[#0A0A0C] w-full h-[90vh] rounded-t-[2.5rem] shadow-2xl relative z-10 flex flex-col transition-transform duration-500 ease-out ${addState.open ? 'translate-y-0' : 'translate-y-full'}`}>
                            <div className="flex p-4 mt-2 mx-6 bg-gray-200 dark:bg-[#1C1C1E] rounded-2xl mb-4">
                                {[ { id: 'search', l: 'Global' }, { id: 'ai', l: 'AI Finder' }, { id: 'bulk', l: 'Bulk Paste' } ].map(t => (
                                    <button key={t.id} onClick={() => { setAddState(p => ({...p, tab: t.id, query: '', results: []})); setBulkState({input:'', results:[], loading:false, preview:false}); }} className={`flex-1 py-2 text-xs font-black rounded-xl bouncy-tap transition-all ${addState.tab === t.id ? 'bg-white dark:bg-[#2C2C2E] shadow-sm scale-105' : 'text-gray-500'}`}>
                                        {t.l}
                                    </button>
                                ))}
                            </div>
                            
                            <div className="px-6 flex-1 flex flex-col overflow-hidden">
                                {/* BULK TAB */}
                                {addState.tab === 'bulk' && (
                                    <div className="flex flex-col h-full animate-spring-up">
                                        {!bulkState.preview ? (
                                            <>
                                                <textarea value={bulkState.input} onChange={e => setBulkState(p => ({...p, input: e.target.value}))} placeholder="Interstellar&#10;Naruto&#10;The Matrix (1999)..." className="flex-1 w-full bg-white dark:bg-[#151517] p-4 rounded-3xl resize-none text-sm font-bold focus:outline-none mb-4 shadow-sm border border-black/5 dark:border-white/5"></textarea>
                                                <button onClick={processBulkImport} disabled={bulkState.loading} className="w-full py-4 bg-accent text-white rounded-2xl font-black mb-8 bouncy-tap">
                                                    {bulkState.loading ? <Icon.Loader s={20} c="mx-auto"/> : "Process Import"}
                                                </button>
                                            </>
                                        ) : bulkState.loading ? (
                                            <div className="flex flex-col items-center justify-center flex-1 px-4">
                                                <Icon.Loader s={44} c="text-accent mb-6"/>
                                                {bulkState.progress && bulkState.progress.total > 0 && (
                                                    <>
                                                        <div className="w-full bg-gray-200 dark:bg-[#2C2C2E] rounded-full h-3 mb-3 overflow-hidden">
                                                            <div className="bg-accent h-full rounded-full transition-all duration-200" style={{width: `${Math.round((bulkState.progress.current / bulkState.progress.total) * 100)}%`}}></div>
                                                        </div>
                                                        <p className="font-black text-xl mb-2">{bulkState.progress.current} <span className="text-gray-500 font-bold text-base">/ {bulkState.progress.total}</span></p>
                                                        <p className="text-xs text-gray-400 font-bold text-center line-clamp-1 w-full px-2">"{bulkState.progress.currentTitle}"</p>
                                                    </>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="flex flex-col h-full pb-8">
                                                <div className="flex-1 overflow-y-auto space-y-2 hide-scrollbar mb-4">
                                                    {bulkState.results.map((r, i) => (
                                                        <div key={i} className="flex items-center p-3 bg-white dark:bg-[#151517] rounded-xl text-sm font-bold shadow-sm animate-spring-up" style={{animationDelay: `${i * 0.05}s`}}>
                                                            {r.success ? <Icon.Check s={16} c="text-green-500 mr-2"/> : <Icon.X s={16} c="text-red-500 mr-2"/>}
                                                            <span className="flex-1 truncate">{r.success ? r.item.title : r.original}</span>
                                                            <span className="text-[10px] uppercase text-gray-500">{r.success ? r.item.type : 'Failed'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="flex gap-3">
                                                    <button onClick={() => setBulkState(p=>({...p, preview:false}))} className="w-14 py-4 bg-gray-200 dark:bg-[#2C2C2E] rounded-2xl flex justify-center bouncy-tap"><Icon.ChevronL s={20}/></button>
                                                    <button onClick={commitBulkImport} className="flex-1 py-4 bg-green-500 text-white rounded-2xl font-black bouncy-tap">Commit Valid Items</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* SEARCH & AI TAB */}
                                {(addState.tab === 'search' || addState.tab === 'ai') && (
                                    <>
                                        <div className="relative mb-6 animate-spring-up">
                                            {addState.tab === 'ai' ? <Icon.Sparkles s={20} c="absolute left-5 top-[18px] text-purple-500" /> : <Icon.Search s={20} c="absolute left-5 top-[18px] text-gray-400" />}
                                            <input type="text" placeholder={addState.tab === 'ai' ? "e.g. Space movies that make you cry" : "Search database e.g. Matrix (1999)..."} autoFocus value={addState.query} onChange={(e) => setAddState(p => ({...p, query: e.target.value}))} className="w-full bg-white dark:bg-[#151517] text-black dark:text-white rounded-[2rem] py-4 pl-14 pr-6 text-sm font-bold focus:outline-none shadow-sm border border-black/5 dark:border-white/5 transition-all duration-300 focus:shadow-md" />
                                            {addState.tab === 'ai' && <button onClick={runSmartSearch} className="absolute right-2 top-2 bg-purple-500 text-white px-4 py-2.5 rounded-3xl text-xs font-black shadow-sm bouncy-tap">Ask</button>}
                                        </div>
                                        <div className="flex-1 overflow-y-auto pb-10 hide-scrollbar -mx-2 px-2">
                                            {addState.loading && <Icon.Loader s={32} c="text-accent mx-auto mt-10"/>}
                                            <div className="grid gap-3">
                                                {addState.results.map((res, i) => {
                                                    const inVault = vault.some(v => v.aid === res.aid); 
                                                    const CatInfo = CATEGORIES.find(c => c.id === res.type) || CATEGORIES[0];
                                                    return (
                                                        <div key={res.id} onClick={() => { !inVault && openDetail(res) }} className={`flex items-center p-3 rounded-3xl bg-white dark:bg-[#151517] shadow-sm border border-black/5 dark:border-white/5 cursor-pointer animate-spring-up ${inVault ? 'opacity-50' : 'bouncy-tap'}`} style={{animationDelay: `${i * 0.05}s`}}>
                                                            <div className="w-14 h-20 bg-gray-100 dark:bg-[#1C1C1E] rounded-2xl overflow-hidden flex-shrink-0 mr-4">
                                                                {res.image ? <img src={res.image} className="w-full h-full object-cover"/> : <div className="w-full h-full flex justify-center items-center">{React.createElement(CatInfo.i, {s: 24, c: CatInfo.c})}</div>}
                                                            </div>
                                                            <div className="flex-1 overflow-hidden">
                                                                <h4 className="font-black text-sm truncate">{res.title}</h4>
                                                                <span className={`text-[10px] font-black uppercase px-2 py-1 rounded-lg inline-block mt-1 ${CatInfo.b} ${CatInfo.c}`}>{res.type} • {res.year}</span>
                                                            </div>
                                                            <div className="pr-4">{inVault ? <Icon.Check s={24} c="text-green-500" /> : <Icon.Plus s={24} c="text-gray-300 dark:text-white" />}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* DEEP DETAIL MODAL */}
                    <div className={`absolute inset-0 z-[70] bg-[#F2F2F7] dark:bg-[#0A0A0C] flex flex-col transition-all duration-500 ease-out ${viewingItem ? 'translate-y-0 opacity-100' : 'translate-y-full opacity-0'}`}>
                        {renderSafeModal()}
                    </div>

                    {/* ACTOR PROFILE MODAL */}
                    {actorProfile && (
                        <div className="absolute inset-0 z-[80] bg-black/60 backdrop-blur-md flex flex-col justify-end transition-opacity duration-300">
                            <div className="bg-[#F2F2F7] dark:bg-[#0A0A0C] w-full h-[85vh] rounded-t-[2.5rem] shadow-2xl relative flex flex-col pt-6 px-6 animate-spring-up">
                                <button onClick={() => setActorProfile(null)} className="absolute top-4 right-6 bg-gray-200 dark:bg-[#1C1C1E] p-2 rounded-full bouncy-tap z-10"><Icon.X s={20}/></button>
                                {actorProfile.loading ? (
                                    <Icon.Loader s={40} c="m-auto text-accent"/>
                                ) : (
                                    <div className="flex-1 overflow-y-auto hide-scrollbar pb-10 mt-6">
                                        <div className="flex items-center space-x-5 mb-6 animate-spring-up">
                                            <div className="w-24 h-24 rounded-full overflow-hidden bg-gray-200 dark:bg-[#1C1C1E] border border-black/5 dark:border-white/5 flex-shrink-0">{actorProfile.image && <img src={actorProfile.image} className="w-full h-full object-cover"/>}</div>
                                            <div><h2 className="text-2xl font-black mb-1">{actorProfile.name}</h2><span className="text-xs font-bold text-gray-500 uppercase">Actor Profile</span></div>
                                        </div>
                                        
                                        <ExpandableText text={actorProfile.bio} maxChars={220} />
                                        
                                        <h3 className="text-xs font-black text-gray-500 uppercase tracking-wider mb-4 animate-spring-up" style={{animationDelay:"0.2s"}}>Known For</h3>
                                        <div className="grid grid-cols-3 gap-3">
                                            {actorProfile.knownFor?.map((k, i) => (
                                                <div key={i} onClick={() => { setActorProfile(null); openDetail(k); }} className="cursor-pointer bouncy-tap animate-spring-up" style={{animationDelay: `${0.2 + (i * 0.05)}s`}}>
                                                    <div className="h-32 bg-gray-200 dark:bg-[#1C1C1E] rounded-2xl overflow-hidden mb-2 border border-black/5 dark:border-white/5">{k.image && <img src={k.image} className="w-full h-full object-cover"/>}</div>
                                                    <p className="text-[10px] font-bold text-center truncate">{k.title}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body></html>
